ai_usage_summary: |
  Used Cursor and Claude for architecture discussion, code scaffolding, and debugging.
  No candidate data was sent to external LLM APIs during ranking. All scoring runs locally on CPU.

methodology_summary: |
  Hybrid ranker with six components: (1) title-fit gate that penalizes keyword-stuffer traps,
  (2) trusted core-skill matching weighted by endorsements/duration/assessments,
  (3) semantic similarity via pre-computed TF-IDF vectors,
  (4) career quality scoring for product-company ML production evidence,
  (5) behavioral multiplier from Redrob platform signals,
  (6) honeypot penalty for inconsistent profiles. Title and career narrative are
  decisive signals per JD guidance; behavioral signals modulate availability.
  Pre-computation generates embeddings offline; ranking completes in ~2 min on CPU.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
